site_name: Faststore
site_url: https://ichinga-samuel.github.io/faststore
site_description: Production-ready file upload toolkit for FastAPI
site_author: Ichinga Samuel

repo_name: Ichinga-Samuel/faststore
repo_url: https://github.com/Ichinga-Samuel/faststore

copyright: Copyright &copy; 2024 – 2026 Ichinga Samuel

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
    logo: material/cloud-upload
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - guide/index.md
      - Storage Backends: guide/backends.md
      - Validation: guide/validation.md
      - Callbacks: guide/callbacks.md
      - Multi-Field Uploads: guide/multi-field.md
      - Reading Results: guide/results.md
      - Error Handling: guide/errors.md
  - API Reference:
      - api/index.md
      - FileStore: api/filestore.md
      - Config: api/config.md
      - FileField: api/filefield.md
      - FileData: api/filedata.md
      - Store: api/store.md
      - Storage Engines: api/engines.md
      - Exceptions: api/exceptions.md
  - Examples:
      - examples/index.md
      - User Avatars: examples/avatars.md
      - Document Upload Service: examples/documents.md
      - Image Processing Pipeline: examples/image-pipeline.md
  - Configuration: configuration.md
  - Changelog: changelog.md

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ichinga-Samuel/faststore
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/filestore
  generator: false
